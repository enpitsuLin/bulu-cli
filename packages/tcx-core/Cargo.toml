
[package]
edition = "2021"
name    = "bulu_cli_tcx_core"
publish = false
version = "0.0.3"

[lib]
crate-type = ["cdylib"]

[dependencies]
base64                    = "=0.13.1"
napi                      = "3.0.0"
napi-derive               = "3.0.0"
parity-scale-codec        = { version = "=3.2.2", default-features = false }
parity-scale-codec-derive = "=3.6.9"
rlp                       = "=0.5.2"
serde                     = { version = "1", features = ["derive"] }
serde_json                = "1"
tcx-btc-kin               = { git = "https://github.com/consenlabs/token-core-monorepo", branch = "main" }
tcx-common                = { git = "https://github.com/consenlabs/token-core-monorepo", branch = "main" }
tcx-constants             = { git = "https://github.com/consenlabs/token-core-monorepo", branch = "main" }
tcx-crypto                = { git = "https://github.com/consenlabs/token-core-monorepo", branch = "main" }
tcx-eth                   = { git = "https://github.com/consenlabs/token-core-monorepo", branch = "main", default-features = false }
tcx-keystore              = { git = "https://github.com/consenlabs/token-core-monorepo", branch = "main", default-features = false }
tcx-primitive             = { git = "https://github.com/consenlabs/token-core-monorepo", branch = "main", default-features = false }
tcx-tron                  = { git = "https://github.com/consenlabs/token-core-monorepo", branch = "main" }
thiserror                 = "1"

[build-dependencies]
napi-build = "2"
